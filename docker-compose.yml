services:
  postgres:
    image: postgres:16-alpine
    container_name: kalenda-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kalenda}
      POSTGRES_USER: ${POSTGRES_USER:-kalenda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalenda}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/jaumoso/kalenda-backend:${APP_TAG:-latest}
    container_name: kalenda-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kalenda}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kalenda}?schema=public
      - NODE_ENV=production
      - COOKIE_SECRET=${COOKIE_SECRET:-default-secret-change-in-production}
      - JWT_SECRET=${JWT_SECRET:-default-jwt-secret-change-in-production}
      - UPLOAD_PATH=/data/uploads
      - EXPORT_PATH=/data/exports
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  puppeteer:
    image: ghcr.io/jaumoso/kalenda-puppeteer:${APP_TAG:-latest}
    environment:
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - FRONTEND_URL=http://backend:3000
    ports:
      - "4000:4000"
    volumes:
      - ./data/exports:/data/exports
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
