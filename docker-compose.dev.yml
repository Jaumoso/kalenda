services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calendapp
      POSTGRES_USER: calendapp
      POSTGRES_PASSWORD: calendapp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.dev
    environment:
      - DATABASE_URL=postgresql://calendapp:calendapp_password@postgres:5432/calendapp?schema=public
      - NODE_ENV=development
      - COOKIE_SECRET=dev-secret-key
      - JWT_SECRET=dev-jwt-secret-key
      - UPLOAD_PATH=/data/uploads
      - EXPORT_PATH=/data/exports
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma
      - ./packages/shared/src:/app/packages/shared/src
      - ./data:/data
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
    environment:
      - VITE_API_URL=http://backend:3000
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/index.html:/app/apps/frontend/index.html
      - ./packages/shared/src:/app/packages/shared/src
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
